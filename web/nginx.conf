# =============================================================================
# nginx 配置 - 星仔高端定制前端
# 主要职责:
#   1. 服务 /usr/share/nginx/html (Vite build 产物)
#   2. 反向代理 /api → 后端 service:api:8080 (Docker 网络别名)
#   3. SPA fallback (任何不匹配 -> /index.html)
#   4. gzip + 静态资源缓存
# =============================================================================

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        image/x-icon;

    # ---------- 静态资源 (img-pool/ 都由 builder 拷过来) ----------
    location /img-pool/ {
        alias /usr/share/nginx/html/img-pool/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 7d;
        access_log off;
    }
    location ~* \.(js|css|png|jpe?g|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ---------- 反向代理后端 ----------
    # Docker compose 网络中, 后端 service 名是 "api"
    # 浏览器请求 -> nginx -> http://api:8080/api/v1/*
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        # websocket / event-stream (本项目暂未用)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- SPA fallback ----------
    # React Router, 所有非 /api / /img-pool / /assets / *.ext 的路径都返 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---------- 健康检查 ----------
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}